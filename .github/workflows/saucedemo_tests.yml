name: SauceDemo Tests 🚀

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code 📥
      uses: actions/checkout@v4

    - name: Setup Python 3.11 🐍
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Update package lists 🗂️
      run: sudo apt-get update

    - name: Install system dependencies ⚙️
      run: sudo apt-get install -y libasound2t64 libatk1.0-0 libcups2-dev libdbus-1-3 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libxss1 libasound2

    - name: Install dependencies 📦
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers 🌐
      run: |
        playwright install chromium
        playwright install-deps chromium

    - name: Verify setup ✅
      run: python verify_setup.py

    - name: Run tests 🧪
      run: |
        pytest tests/ --html=reports/report.html --self-contained-html --screenshot=only-on-failure --tracing=retain-on-failure --video=retain-on-failure
      env:
        CI: true
        PYTHONPATH: ${{ github.workspace }}

    - name: Upload test reports 📊
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: reports/report.html

    - name: Upload screenshots 📸
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: screenshots
        path: screenshots/

    - name: Upload logs 📝
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: logs
        path: logs/

    - name: Upload test results on failure 🚨
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-results
        path: test-results/
